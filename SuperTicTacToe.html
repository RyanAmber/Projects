<!--Run locally for testing: npm start
Deploy updates to GitHub Pages: npm run deploy-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Tic-Tac-Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090c10;
    --panel: #0d1117;
    --border: #1e2a3a;
    --x-color: #0099ff;
    --x-glow: rgba(0, 255, 255, 0.514);
    --btn-color:#199400;
    --btn-glow:#49c031;
    --o-color: #ff4b6e;
    --o-glow: rgba(255,75,110,0.35);
    --active-glow: rgba(255,215,0,0.4);
    --active-border: #ffd700;
    --dim: #3a4a5a;
    --text: #c8d8e8;
    --text-dim: #5a7080;
    --font-main: 'Exo 2', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0,229,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 70%, rgba(255,75,110,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: var(--font-main);
    font-weight: 800;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }

  h1 span.x { color: var(--x-color); }
  h1 span.o { color: var(--o-color); }

  .subtitle {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  /* ====== SETUP SCREEN ====== */
  #setup {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 420px;
  }

  .instructions {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .instructions strong { color: var(--text); }

  .setup-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    width: 100%;
    gap: 12px;
  }

  .setup-row label {
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .player-badge {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: bold;
    padding: 2px 10px;
    border-radius: 4px;
    margin-right: 8px;
  }

  .player-badge.x { color: var(--x-color); border: 1px solid var(--x-color); }
  .player-badge.o { color: var(--o-color); border: 1px solid var(--o-color); }

  select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    min-width: 130px;
  }

  select:focus { border-color: var(--x-color); }

  .btn {
    background: transparent;
    color: var(--btn-color);
    border: 1px solid var(--btn-color);
    padding: 11px 32px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--btn-color);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover { color: var(--bg); box-shadow: 0 0 20px var(--btn-glow); }
  .btn:hover::before { opacity: 1; }
  .btn span { position: relative; z-index: 1; }

  .btn-sm {
    padding: 7px 20px;
    font-size: 0.78rem;
    color: var(--text-dim);
    border-color: var(--border);
  }
  .btn-sm:hover { color: var(--text); border-color: var(--text-dim); box-shadow: none; }
  .btn-sm:hover::before { opacity: 0; }

  /* ====== GAME SCREEN ====== */
  #game { display: none; position: relative; z-index: 1; width: 100%; max-width: 620px; }

  #status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 10px;
  }

  #status {
    font-family: var(--font-mono);
    font-size: 0.88rem;
    color: var(--text);
    flex: 1;
    min-height: 1.4em;
    transition: color 0.3s;
  }

  #status.x-turn { color: var(--x-color); }
  #status.o-turn { color: var(--o-color); }
  #status.win { color: #ffd900; }

  .score-display {
    display: flex;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 0.82rem;
  }

  .score-box {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .score-box.x { border-color: var(--x-glow); color: var(--x-color); }
  .score-box.o { border-color: var(--o-glow); color: var(--o-color); }

  /* ====== OUTER BOARD ====== */
  #outer-board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    background: var(--border);
    padding: 6px;
    border-radius: 10px;
    border: 1px solid var(--border);
    width: 100%;
    aspect-ratio: 1;
  }

  .sub-board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    background: #080b0f;
    padding: 4px;
    border-radius: 6px;
    position: relative;
    border: 1px solid #111820;
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }

  .sub-board.active {
    border-color: var(--active-border);
    box-shadow: 0 0 14px var(--active-glow), inset 0 0 8px rgba(255,215,0,0.05);
  }

  .sub-board.choosable {
    border-color: #888;
    box-shadow: 0 0 10px rgba(200,200,200,0.2);
    cursor: pointer;
    animation: pulse-choosable 1.2s ease-in-out infinite;
  }

  @keyframes pulse-choosable {
    0%, 100% { box-shadow: 0 0 8px rgba(200,200,200,0.2); }
    50% { box-shadow: 0 0 18px rgba(200,200,200,0.4); }
  }

  .cell {
    background: var(--panel);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-weight: bold;
    font-size: clamp(0.8rem, 2.5vw, 1.2rem);
    cursor: default;
    user-select: none;
    aspect-ratio: 1;
    transition: background 0.15s, box-shadow 0.15s;
    border: 1px solid var(--border);
  }

  .cell.X {
    color: var(--x-color);
    text-shadow: 0 0 8px var(--x-glow);
    border-color: rgba(0,229,255,0.15);
  }

  .cell.O {
    color: var(--o-color);
    text-shadow: 0 0 8px var(--o-glow);
    border-color: rgba(255,75,110,0.15);
  }

  .cell.clickable {
    cursor: pointer;
    background: #111820;
    border-color: #2a3a4a;
  }

  .cell.clickable:hover {
    background: #172030;
    border-color: var(--active-border);
    box-shadow: 0 0 8px rgba(255,215,0,0.3);
  }

  /* Won sub-board overlay */
  .win-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-main);
    font-weight: 800;
    font-size: clamp(2.2rem, 8vw, 3.8rem);
    border-radius: 6px;
    z-index: 2;
    pointer-events: none;
  }

  .win-overlay.X {
    color: var(--x-color);
    background: rgba(0,229,255,0.12);
    text-shadow: 0 0 30px var(--x-glow);
    border: 2px solid rgba(0,229,255,0.3);
  }

  .win-overlay.O {
    color: var(--o-color);
    background: rgba(255,75,110,0.12);
    text-shadow: 0 0 30px var(--o-glow);
    border: 2px solid rgba(255,75,110,0.3);
  }

  .win-overlay.C {
    color: var(--text-dim);
    background: rgba(60,70,80,0.7);
    font-size: clamp(1rem, 3vw, 1.5rem);
    letter-spacing: 0.1em;
    border: 2px solid var(--border);
  }

  #game-footer {
    display: flex;
    justify-content: center;
    margin-top: 14px;
  }

  /* AI thinking indicator */
  .thinking-dots::after {
    content: '';
    animation: dots 1.2s infinite;
  }

  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
    100% { content: ''; }
  }

  /* Winning announcement */
  #win-banner {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    backdrop-filter: blur(4px);
  }

  #win-banner.show { display: flex; }

  .win-banner-content {
    text-align: center;
    padding: 40px 60px;
    border-radius: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
  }

  .win-banner-text {
    font-family: var(--font-main);
    font-weight: 800;
    font-size: clamp(2rem, 6vw, 3rem);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .win-banner-text.X { color: var(--x-color); text-shadow: 0 0 40px var(--x-color); }
  .win-banner-text.O { color: var(--o-color); text-shadow: 0 0 40px var(--o-color); }
  .win-banner-text.tie { color: #ffd700; text-shadow: 0 0 40px #ffd700; }

  .win-banner-sub {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-bottom: 28px;
  }

  .win-banner-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<h1><span class="x">X</span> Super Tic-Tac-Toe <span class="o">O</span></h1>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="instructions">
    <strong><p style="text-align: center;">How to play:</p></strong>
    Win sub-boards by getting 3-in-a-row.<br>
    Your move position decides the <em>next</em> board.<br>
    That's where your opponent plays.<br>
    Win 3 sub-boards in a row to claim victory!
  </div>
  <div class="setup-row">
    <label><span class="player-badge x">X</span> Player 1</label>
    <select id="p1type">
      <option value="1">Human</option>
      <option value="2">Easy</option>
      <option value="3">Hard</option>
      <option value="4">Extreme</option>
    </select>
  </div>
  <div class="setup-row">
    <label><span class="player-badge o">O</span> Player 2</label>
    <select id="p2type">
      <option value="1">Human</option>
      <option value="2">Easy</option>
      <option value="3" selected>Hard</option>
      <option value="4">Extreme</option>
    </select>
  </div>
  <button class="btn" onclick="startGame()"><span>Start Game</span></button>
  <button class="btn" href=""><span>Return to Main Page</span></button>
</div>

<!-- GAME SCREEN -->
<div id="game">
  <div id="status-bar">
    <div id="status"></div>
    <div class="score-display">
      <div class="score-box x" id="score-x">X-Boards: 0</div>
      <div class="score-box o" id="score-o">O-Boards: 0</div>
    </div>
  </div>
  <div id="outer-board"></div>
  <div id="game-footer">
    <button class="btn btn-sm" onclick="showSetup()"><span>↩ New Game</span></button>
  </div>
</div>

<!-- WIN BANNER -->
<div id="win-banner">
  <div class="win-banner-content">
    <div class="win-banner-text" id="win-banner-text"></div>
    <div class="win-banner-sub" id="win-banner-sub"></div>
    <div class="win-banner-btns">
      <button class="btn" onclick="rematch()"><span>Rematch</span></button>
      <button class="btn btn-sm" onclick="showSetup()"><span>New Setup</span></button>
    </div>
  </div>
</div>

<script src="SuperTicTacToe.js"> </script>
</body>
</html>
